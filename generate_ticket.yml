name: Generate GO Transit Ticket

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate ticket and email
        run: |
          export RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"
          export ROUTE="Union Station GO to Bronte GO"
          export INCREMENT="300"
          export OUTPUT_FILE="index.html"
          export TICKET_URL="https://eticket.nnozio.com"
          python3 send_ticket.py

      - name: Commit updated state and ticket page
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add index.html ticket_state.json
          git commit -m "Regular ticket - $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
