name: Generate GO Transit Ticket

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate ticket and email
        env:
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
        run: python3 send_ticket.py

      - name: Push ticket page to GitHub Pages
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add index.html
          git commit -m "Update ticket - $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
