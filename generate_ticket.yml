name: Generate GO Transit Ticket

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: List files (debug)
        run: ls -la

      - name: Run ticket generator
        run: |
          export GH_PAT="${{ secrets.GH_TOKEN }}"
          export GMAIL_APP_PASS="${{ secrets.GMAIL_APP_PASS }}"
          export GMAIL_ADDRESS="${{ secrets.GMAIL_ADDRESS }}"
          python3 send_ticket.py
