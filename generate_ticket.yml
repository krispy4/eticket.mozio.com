name: Generate GO Transit Ticket

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Debug secrets
        env:
          TEST_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "Token length: ${#TEST_TOKEN}"
          echo "First 4 chars: ${TEST_TOKEN:0:4}"

      - name: Run ticket generator
        env:
          GH_PAT: ${{ secrets.GH_TOKEN }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
        run: python3 send_ticket.py
