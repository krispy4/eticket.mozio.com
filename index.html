<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GO Transit Ticket</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet">
<style>
  #active-text { animation: active-breathe 3.5s ease-in-out infinite; animation-delay: -1.75s; }
</style>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @keyframes active-breathe {
    0%   { fill: #2843E3; }
    50%  { fill: #FFFFFF; }
    100% { fill: #2843E3; }
  }

  @keyframes blue-breathe {
    0%   { background-color: #1528A3; }
    50%  { background-color: #2843E3; }
    100% { background-color: #1528A3; }
  }

  @keyframes blue-breathe-border {
    0%   { border-color: #2943E9; }
    50%  { border-color: #4060FF; }
    100% { border-color: #2943E9; }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    margin: 0;
    padding: 0;
    width: 100%;
    overflow-x: hidden;
    background: white;
    min-height: 100vh;
  }

  .phone-frame {
    width: 100%;
    background: #1528A3;
    animation: blue-breathe 3.5s ease-in-out infinite;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    background: #1528A3;
    animation: blue-breathe 3.5s ease-in-out infinite;
    padding: 14px 0 0;
    text-align: center;
  }

  /* Scrolling ticker */
  .ticker-wrap {
    overflow: hidden;
    width: 100%;
    padding: 6px 0 10px;
  }

  /* Two copies side by side, seamless loop */
  .ticker-track {
    display: inline-flex;
    animation: ticker-scroll 10s linear infinite;
    white-space: nowrap;
  }

  .ticker-unit {
    display: inline-flex;
    align-items: center;
    color: white;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 1px;
  }

  .ticker-dot {
    display: inline-block;
    width: 9px;
    height: 9px;
    background: white;
    border-radius: 50%;
    margin: 0 60px;
    vertical-align: middle;
    flex-shrink: 0;
  }

  @keyframes ticker-scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ── ROUTE BANNER ── */
  .route-banner {
    padding: 0 16px 26px;
    text-align: center;
    color: white;
    font-size: 15px;
    font-weight: 400;
    position: relative;
    border-bottom: 4px solid #2943E9;
  }

  .route-dot {
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 3px solid white;
    background: #2943E9;
    z-index: 2;
  }


  /* ── TICKET BODY ── */
  .ticket-body {
    background: white;
    padding: 28px 20px 0;
    flex: none;
  }

  .passenger-row {
    border-bottom: 1.5px dashed #ccc;
    margin-bottom: 18px;
    margin-left: -20px;
    margin-right: -20px;
    padding-left: 20px;
    padding-right: 20px;
  }

  .row-top {
    display: flex;
    align-items: center;
    padding: 10px 0 8px;
    position: relative;
  }

  .row-top-left  { width: 50%; text-align: center; }
  .row-top-center { position: absolute; left: 50%; transform: translateX(-50%); }
  .row-top-right { width: 50%; text-align: center; }

  .mid-divider {
    width: 100%;
    height: 1.5px;
    background: #ddd;
  }

  .row-bottom {
    display: flex;
    align-items: center;
    padding: 10px 0 18px;
  }

  .row-bottom-left  { width: 50%; text-align: center; }
  .row-bottom-center { width: 0; }
  .row-bottom-right { width: 50%; text-align: center; }






  .passenger-count { font-size: 60px; font-weight: 300; color: #404952; line-height: 1; }
  .passenger-label { font-size: 21px; font-weight: 700; color: #404952; margin-top: -6px; }
  .passenger-type { font-size: 18px; color: #404952; margin-top: -13px; }



  .vert-line { width: 1px; height: 30px; background: #ccc; margin: 4px auto; }


  .arrow { font-size: 48px; color: #333; }
  .direction-label { font-size: 20px; font-weight: 700; color: #404952; margin-top: 8px; }

  /* ── TICKET NUMBER ── */
  .ticket-number-row {
    text-align: center;
    margin-bottom: 10px;
    font-size: 22px;
    color: #222;
  }
  .ticket-number-row strong { font-weight: 700; color: #394048; }

  /* ── BARCODE ── */
  .barcode-container {
    position: relative;
    margin: 0 0 16px;
    height: 72px;
  }

  .barcode-svg { width: 100%; height: 72px; }

  .barcode-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #1528A3;
    background: rgba(255,255,255,0.9);
    padding: 2px 12px;
  }

  /* ── TIME GRID ── */
  .time-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    margin-bottom: 16px;
  }

  .time-label {
    font-size: 10px;
    font-weight: 800;
    color: #222;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .time-value {
    font-size: 13px;
    font-weight: 600;
    color: #222;
  }

  .time-right { text-align: right; }

  /* ── BOTTOM SECTION ── */
  .bottom-section {
    background: #1528A3;
    animation: blue-breathe 3.5s ease-in-out infinite;
    padding: 20px 16px 45px;
    text-align: center;
    border-top: 4px solid #2943E9;
    border-bottom: 4px solid #2943E9;
    flex: none;
  }

  .white-footer {
    background: white;
    flex: 1;
  }

  .bottom-message {
    color: white;
    font-size: 22px;
    line-height: 1.5;
    margin-bottom: 14px;
    margin-top: 55px;
  }

  .big-timer {
    color: white;
    font-size: 48px;
    font-weight: 300;
    letter-spacing: 0;
    font-variant-numeric: tabular-nums;
    margin-top: -10px;
  }
</style>
</head>

<script>
  const POST_ACTIVATION_SECS = 4 * 60 * 60;

  // Lock activation time on first open, persist across refreshes
  const TICKET_KEY = "go_activation_MZ66987827";
  let storedTime = localStorage.getItem(TICKET_KEY);
  if (!storedTime) {
    storedTime = new Date().toISOString();
    localStorage.setItem(TICKET_KEY, storedTime);
  }
  const ACTIVATION_TIME = new Date(storedTime);

  function pad(n) { return String(n).padStart(2, '0'); }

  function formatDateTime(d) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun',
                    'Jul','Aug','Sep','Oct','Nov','Dec'];
    let h = d.getHours(), m = pad(d.getMinutes()), s = pad(d.getSeconds());
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} ${pad(h)}:${m}:${s} ${ampm}`;
  }

  function tick() {
    const now = new Date();
    const sinceActivation = (now - ACTIVATION_TIME) / 1000;
    const remaining4h = Math.max(0, POST_ACTIVATION_SECS - sinceActivation);

    const sh = Math.floor(sinceActivation / 3600);
    const sm = Math.floor((sinceActivation % 3600) / 60);
    const ss = Math.floor(sinceActivation % 60);

    const rh = Math.floor(remaining4h / 3600);
    const rm = Math.floor((remaining4h % 3600) / 60);
    const rs = Math.floor(remaining4h % 60);

    document.getElementById('time-display').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:8px;padding-left:12%;padding-right:0;margin-right:-16px;">
        <div style="text-align:left;">
          <div style="font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:0;color:#222;display:block;text-align:center;margin-left:-50px;">CURRENT DATE &amp; TIME:</div>
          <div style="font-size:17px;font-weight:700;color:#383F47;display:block;margin-left:-60px;white-space:nowrap;"><strong>${formatDateTime(now)}</strong></div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:0;color:#222;">TIME SINCE ACTIVATION:</div>
          <div style="font-size:17px;font-weight:700;color:#383F47;display:block;text-align:center;"><strong>${pad(sh)}:${pad(sm)}:${pad(ss)}</strong></div>
        </div>
      </div>`;

    document.getElementById('big-timer').textContent = `${pad(rh)}:${pad(rm)}:${pad(rs)}`;
  }

  tick();
  setInterval(tick, 1000);
</script>
