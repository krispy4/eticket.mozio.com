name: Generate GO Transit Ticket (Work)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate ticket and email
        run: |
          export RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}"
          export ROUTE="Bronte GO to Union Station GO"
          export INCREMENT="5000"
          export OUTPUT_FILE="work.html"
          export TICKET_URL="https://eticket.nnozio.com/work.html"
          python3 send_ticket.py

      - name: Commit updated state and ticket page
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add work.html ticket_state.json
          git commit -m "Work ticket - $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
